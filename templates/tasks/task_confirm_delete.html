{% extends 'base.html' %}

{% block title %}Delete Task - TaskFlow{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-sm border border-gray-100 mt-10 text-center">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-triangle-exclamation text-2xl text-red-600"></i>
    </div>
    
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Delete Task?</h2>
    <p class="text-gray-500 mb-6">Are you sure you want to delete the task <span class="font-semibold text-gray-800">"{{ task.title }}"</span>? This action cannot be undone.</p>
    
    <form method="post" class="flex justify-center space-x-4">
        {% csrf_token %}
        <a href="{% url 'dashboard' %}" class="bg-white border border-gray-300 text-gray-700 px-6 py-2 rounded-md font-medium hover:bg-gray-50 transition shadow-sm">
            Cancel
        </a>
        <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-md font-medium hover:bg-red-700 transition shadow-sm">
            Yes, Delete Task
        </button>
    </form>
</div>
{% endblock %}
